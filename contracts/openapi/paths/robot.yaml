# Function: Robot management endpoint paths for F-ROBOT-001
# Time: 2026-07-05
# Author: AxeXie

robotsCollection:
  get:
    tags: [robot]
    summary: List robots
    description: >-
      Returns a paginated list of registered robots. Results can be filtered
      by `status`, `model_id` and `org_id`. Requires the `robot.robot.read`
      permission.
    operationId: listRobots
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 1
        description: Page number (1-based).
        example: 1
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
        description: Number of items per page.
        example: 20
      - name: status
        in: query
        required: false
        schema:
          $ref: '../schemas/robot.yaml#/RobotStatus'
        description: Filter robots by operational status.
        example: ONLINE
      - name: model_id
        in: query
        required: false
        schema:
          type: string
        description: Filter robots belonging to the given model.
        example: mdl_01J00000000000000000000001
      - name: org_id
        in: query
        required: false
        schema:
          type: string
        description: Filter robots owned by the given organization.
        example: org_01J00000000000000000000001
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Paginated list of robots.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/RobotPage'
            example:
              items:
                - robot_id: rbt_01J00000000000000000000001
                  name: Pioneer-01
                  model_id: mdl_01J00000000000000000000001
                  serial_number: SN-PIONEER-0001
                  status: ONLINE
                  org_id: org_01J00000000000000000000001
                  capabilities:
                    - capability_type: navigation
                      capability_value: enabled
                      details:
                        max_speed: 1.5
                  last_seen_at: '2026-07-05T08:00:00Z'
                  created_at: '2026-07-05T08:00:00Z'
                  updated_at: '2026-07-05T08:00:00Z'
              total: 1
              page: 1
              page_size: 20
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  post:
    tags: [robot]
    summary: Register a robot
    description: >-
      Registers a new robot. The `serial_number` must be unique. The robot is
      created with an initial status of `OFFLINE` until the first heartbeat
      is received. Emits a `robot.registered.v1` event on success. Requires
      the `robot.robot.register` permission. Supports idempotency via the
      `Idempotency-Key` header.
    operationId: createRobot
    parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          maxLength: 128
        description: >-
          Optional idempotency key. When provided, duplicate requests with the
          same key return the original response instead of creating duplicates.
        example: robot-create-pioneer-20260705
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/robot.yaml#/CreateRobotRequest'
          example:
            name: Pioneer-01
            model_id: mdl_01J00000000000000000000001
            serial_number: SN-PIONEER-0001
            org_id: org_01J00000000000000000000001
            capabilities:
              - capability_type: navigation
                capability_value: enabled
    responses:
      '201':
        description: Robot registered.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/Robot'
            example:
              robot_id: rbt_01J00000000000000000000001
              name: Pioneer-01
              model_id: mdl_01J00000000000000000000001
              serial_number: SN-PIONEER-0001
              status: OFFLINE
              org_id: org_01J00000000000000000000001
              capabilities:
                - capability_type: navigation
                  capability_value: enabled
              created_at: '2026-07-05T08:00:00Z'
              updated_at: '2026-07-05T08:00:00Z'
      '400':
        description: Invalid request body.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.register permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: A robot with the same serial_number already exists.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

robotItem:
  parameters:
    - name: robotId
      in: path
      required: true
      schema:
        type: string
      description: Stable public identifier of the robot.
      example: rbt_01J00000000000000000000001
  get:
    tags: [robot]
    summary: Get robot detail
    description: >-
      Returns the full robot detail, including declared capabilities and last
      seen timestamp. Requires the `robot.robot.read` permission.
    operationId: getRobot
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Robot detail.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/Robot'
            example:
              robot_id: rbt_01J00000000000000000000001
              name: Pioneer-01
              model_id: mdl_01J00000000000000000000001
              serial_number: SN-PIONEER-0001
              status: ONLINE
              org_id: org_01J00000000000000000000001
              capabilities:
                - capability_type: navigation
                  capability_value: enabled
                  details:
                    max_speed: 1.5
              last_seen_at: '2026-07-05T08:00:00Z'
              created_at: '2026-07-05T08:00:00Z'
              updated_at: '2026-07-05T08:00:00Z'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  put:
    tags: [robot]
    summary: Update robot
    description: >-
      Updates the mutable fields of a robot. Identity fields (`robot_id`,
      `serial_number`, `model_id`) are not editable through this endpoint.
      Only supplied fields are updated. Requires the `robot.robot.register`
      permission. Supports idempotency via the `Idempotency-Key` header.
    operationId: updateRobot
    parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          maxLength: 128
        description: Optional idempotency key.
        example: robot-update-20260705
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/robot.yaml#/UpdateRobotRequest'
          example:
            name: Pioneer-01-Renamed
            org_id: org_01J00000000000000000000001
    responses:
      '200':
        description: Updated robot detail.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/Robot'
      '400':
        description: Invalid request body.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.register permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  delete:
    tags: [robot]
    summary: Delete robot
    description: >-
      Deletes a robot registration and its associated capabilities. The robot
      must not be in an active mission; deletion of a robot with a non-terminal
      status is rejected. Requires the `robot.robot.register` permission.
      Supports idempotency via the `Idempotency-Key` header.
    operationId: deleteRobot
    parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          maxLength: 128
        description: Optional idempotency key.
        example: robot-delete-20260705
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Robot deleted.
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.register permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: Robot cannot be deleted while in a non-terminal status.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

robotStatus:
  parameters:
    - name: robotId
      in: path
      required: true
      schema:
        type: string
      description: Stable public identifier of the robot.
      example: rbt_01J00000000000000000000001
  patch:
    tags: [robot]
    summary: Update robot status
    description: >-
      Transitions the robot operational status. The transition is validated
      against the SM-ROBOT-001 state machine. The `reason` is recorded in the
      status history and audit log, and a `robot.status_changed.v1` event is
      emitted. Requires the `robot.robot.register` permission. Supports
      idempotency via the `Idempotency-Key` header.
    operationId: updateRobotStatus
    parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          maxLength: 128
        description: Optional idempotency key.
        example: robot-status-20260705
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/robot.yaml#/UpdateRobotStatusRequest'
          example:
            status: MAINTENANCE
            reason: ADMIN_MAINTENANCE
    responses:
      '200':
        description: Updated robot detail.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/Robot'
      '400':
        description: Invalid request body or disallowed status transition.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.register permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: The requested status transition is not allowed by SM-ROBOT-001.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

robotCapabilities:
  parameters:
    - name: robotId
      in: path
      required: true
      schema:
        type: string
      description: Stable public identifier of the robot.
      example: rbt_01J00000000000000000000001
  get:
    tags: [robot]
    summary: List robot capabilities
    description: >-
      Returns the capabilities currently declared by the robot. Requires the
      `robot.robot.read` permission.
    operationId: getRobotCapabilities
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Capabilities declared by the robot.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/RobotCapabilityList'
            example:
              robot_id: rbt_01J00000000000000000000001
              capabilities:
                - capability_type: navigation
                  capability_value: enabled
                  details:
                    max_speed: 1.5
                - capability_type: perception
                  capability_value: enabled
                  details:
                    sensors:
                      - lidar
                      - depth_camera
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  put:
    tags: [robot]
    summary: Update robot capabilities
    description: >-
      Replaces the full set of capabilities declared by the robot. The
      previous capabilities are removed and replaced by the supplied list.
      Emits a `robot.manifest_changed.v1` event on success. Requires the
      `robot.robot.register` permission. Supports idempotency via the
      `Idempotency-Key` header.
    operationId: updateRobotCapabilities
    parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          maxLength: 128
        description: Optional idempotency key.
        example: robot-capabilities-20260705
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/robot.yaml#/UpdateRobotCapabilitiesRequest'
          example:
            capabilities:
              - capability_type: navigation
                capability_value: enabled
              - capability_type: manipulation
                capability_value: enabled
    responses:
      '200':
        description: Updated capabilities.
        content:
          application/json:
            schema:
              $ref: '../schemas/robot.yaml#/RobotCapabilityList'
      '400':
        description: Invalid request body.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the robot.robot.register permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Robot not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
