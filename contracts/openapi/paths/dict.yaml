# Function: Dictionary and i18n REST path definitions for F-PLATFORM-003
# Time: 2026-07-04
# Author: AxeXie

dictTypesCollection:
  get:
    tags: [dictionary]
    summary: List dictionary types
    description: >-
      Returns a paginated list of dictionary types. Results can be filtered by
      `status`. Requires the `platform.dictionary.read` permission.
    operationId: listDictTypes
    parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED]
        description: Filter dictionary types by lifecycle status.
        example: PUBLISHED
      - name: type_code
        in: query
        required: false
        schema:
          type: string
        description: Filter by exact type code (partial match).
        example: user
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Paginated list of dictionary types.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictTypePage'
            example:
              items:
                - type_code: user_status
                  type_name: 用户状态
                  description: User status enum
                  status: PUBLISHED
                  version: 1
                  published_version: 1
                  created_at: '2026-07-04T08:00:00Z'
                  updated_at: '2026-07-04T08:00:00Z'
              total: 1
              page: 1
              page_size: 20
              total_pages: 1
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  post:
    tags: [dictionary]
    summary: Create a dictionary type
    description: >-
      Creates a new dictionary type in DRAFT status. The `type_code` must be
      unique. Requires the `platform.dictionary.manage` permission. Supports
      idempotency via the `Idempotency-Key` header.
    operationId: createDictType
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyParam'
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/dict.yaml#/CreateDictTypeRequest'
          example:
            type_code: robot_status
            type_name: 机器人状态
            description: Robot status enum
    responses:
      '201':
        description: Dictionary type created.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictType'
            example:
              type_code: robot_status
              type_name: 机器人状态
              description: Robot status enum
              status: DRAFT
              version: 1
              created_at: '2026-07-04T08:00:00Z'
              updated_at: '2026-07-04T08:00:00Z'
      '400':
        description: Invalid request body or duplicate type_code.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.manage permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: A dictionary type with the same type_code already exists.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

dictTypeItem:
  parameters:
    - $ref: '#/components/parameters/TypeCodeParam'
  get:
    tags: [dictionary]
    summary: Get a dictionary type
    description: >-
      Returns a single dictionary type by its `type_code`. Requires the
      `platform.dictionary.read` permission.
    operationId: getDictType
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Dictionary type details.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictType'
            example:
              type_code: user_status
              type_name: 用户状态
              description: User status enum
              status: PUBLISHED
              version: 1
              published_version: 1
              created_at: '2026-07-04T08:00:00Z'
              updated_at: '2026-07-04T08:00:00Z'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Dictionary type not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  put:
    tags: [dictionary]
    summary: Update a dictionary type
    description: >-
      Updates the `type_name` or `description` of a dictionary type. The
      `type_code` cannot be changed. Requires the
      `platform.dictionary.manage` permission. Supports idempotency via the
      `Idempotency-Key` header.
    operationId: updateDictType
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyParam'
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/dict.yaml#/UpdateDictTypeRequest'
          example:
            type_name: 用户状态
            description: Updated description
    responses:
      '200':
        description: Dictionary type updated.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictType'
      '400':
        description: Invalid request body.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.manage permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Dictionary type not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  delete:
    tags: [dictionary]
    summary: Delete a dictionary type
    description: >-
      Soft-deletes a dictionary type by archiving it. Only DRAFT or ARCHIVED
      types can be deleted; PUBLISHED types must be archived first. Requires
      the `platform.dictionary.manage` permission.
    operationId: deleteDictType
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Dictionary type deleted.
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.manage permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Dictionary type not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: Type is PUBLISHED and must be archived first.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

dictItemsCollection:
  parameters:
    - $ref: '#/components/parameters/TypeCodeParam'
  get:
    tags: [dictionary]
    summary: List dictionary items by type
    description: >-
      Returns a paginated list of items belonging to the dictionary type
      identified by `type_code`. Results can be filtered by `status`. Requires
      the `platform.dictionary.read` permission.
    operationId: listDictItems
    parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [ACTIVE, INACTIVE, ARCHIVED]
        description: Filter dictionary items by lifecycle status.
        example: ACTIVE
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Paginated list of dictionary items.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictItemPage'
            example:
              items:
                - type_code: user_status
                  item_code: active
                  item_value: ACTIVE
                  label_zh_cn: 启用
                  label_en_us: Active
                  sort_order: 1
                  status: ACTIVE
                  version: 1
              total: 3
              page: 1
              page_size: 20
              total_pages: 1
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.read permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Dictionary type not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
  post:
    tags: [dictionary]
    summary: Create a dictionary item
    description: >-
      Creates a new item under the dictionary type identified by `type_code`.
      The `item_code` must be unique within the type. Requires the
      `platform.dictionary.manage` permission. Supports idempotency via the
      `Idempotency-Key` header.
    operationId: createDictItem
    parameters:
      - $ref: '#/components/parameters/IdempotencyKeyParam'
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/dict.yaml#/CreateDictItemRequest'
          example:
            item_code: active
            item_value: ACTIVE
            label_zh_cn: 启用
            label_en_us: Active
            sort_order: 1
    responses:
      '201':
        description: Dictionary item created.
        content:
          application/json:
            schema:
              $ref: '../schemas/dict.yaml#/DictItem'
            example:
              type_code: user_status
              item_code: active
              item_value: ACTIVE
              label_zh_cn: 启用
              label_en_us: Active
              sort_order: 1
              status: ACTIVE
              version: 1
              created_at: '2026-07-04T08:00:00Z'
              updated_at: '2026-07-04T08:00:00Z'
      '400':
        description: Invalid request body or duplicate item_code.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '401':
        description: Authentication required.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '403':
        description: Caller lacks the platform.dictionary.manage permission.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '404':
        description: Parent dictionary type not found.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'
      '409':
        description: An item with the same item_code already exists in this type.
        content:
          application/problem+json:
            schema:
              $ref: '../schemas/error.yaml#/ProblemDetails'

dictItemResource:
  parameters:
    - $ref: '#/components/parameters/TypeCodeParam'
