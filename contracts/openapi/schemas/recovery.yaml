# Function: Backup and recovery schemas for F-RECOVERY-001
# Time: 2026-07-05
# Author: AxeXie
BackupRecord:
  type: object
  description: >-
    A database or MinIO backup record backed by the
    `recovery.backup_record` table. `type` is `DATABASE` (pg_dump) or
    `MINIO` (object storage snapshot). Follows SM-BACKUP-OPERATION
    (RUNNING → COMPLETED / FAILED). All field names use snake_case.
  required:
    - backup_id
    - type
    - file_path
    - file_size
    - status
    - started_at
  additionalProperties: false
  properties:
    backup_id:
      type: string
      description: Unique, prefixed public identifier of the backup (ULID-based).
      example: bkp_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    type:
      type: string
      description: Backup target type.
      enum:
        - DATABASE
        - MINIO
      example: DATABASE
    file_path:
      type: string
      description: Path where the backup file is stored.
      example: backups/db/opengeobot-20260705-020000.dump
    file_size:
      type: integer
      format: int64
      description: Size of the backup file in bytes.
      example: 5242880
    status:
      type: string
      description: Backup lifecycle status.
      enum:
        - RUNNING
        - COMPLETED
        - FAILED
      example: COMPLETED
    started_at:
      type: string
      format: date-time
      description: UTC timestamp when the backup started.
      example: '2026-07-05T02:00:00Z'
    completed_at:
      type: string
      format: date-time
      description: UTC timestamp when the backup finished.
      example: '2026-07-05T02:05:00Z'
    error_message:
      type: string
      description: Error details when the backup failed.
      example: pg_dump process exited with code 1.
    created_by:
      type: string
      description: Actor that triggered the backup (system or user).
      example: system
RestoreRecord:
  type: object
  description: >-
    A restore operation record backed by the `recovery.restore_record` table.
    Follows SM-RESTORE-OPERATION (RUNNING → COMPLETED / FAILED). All field
    names use snake_case.
  required:
    - restore_id
    - backup_id
    - status
    - started_at
  additionalProperties: false
  properties:
    restore_id:
      type: string
      description: Unique, prefixed public identifier of the restore (ULID-based).
      example: rst_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    backup_id:
      type: string
      description: Identifier of the backup being restored.
      example: bkp_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    status:
      type: string
      description: Restore lifecycle status.
      enum:
        - RUNNING
        - COMPLETED
        - FAILED
      example: COMPLETED
    started_at:
      type: string
      format: date-time
      description: UTC timestamp when the restore started.
      example: '2026-07-05T03:00:00Z'
    completed_at:
      type: string
      format: date-time
      description: UTC timestamp when the restore finished.
      example: '2026-07-05T03:04:00Z'
    error_message:
      type: string
      description: Error details when the restore failed.
      example: Restore target database not reachable.
    restored_by:
      type: string
      description: Actor that initiated the restore.
      example: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
DrillRecord:
  type: object
  description: >-
    A disaster recovery drill record backed by the `recovery.drill_record`
    table. Drills verify backup integrity and restore procedures. All field
    names use snake_case.
  required:
    - drill_id
    - type
    - result
    - executed_at
  additionalProperties: false
  properties:
    drill_id:
      type: string
      description: Unique, prefixed public identifier of the drill (ULID-based).
      example: drl_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    type:
      type: string
      description: Drill type (BACKUP_VERIFY, RESTORE_SIMULATION, FAILOVER).
      enum:
        - BACKUP_VERIFY
        - RESTORE_SIMULATION
        - FAILOVER
      example: BACKUP_VERIFY
    result:
      type: string
      description: Drill outcome.
      enum:
        - PASSED
        - FAILED
        - PARTIAL
      example: PASSED
    notes:
      type: string
      description: Optional notes from the drill.
      example: All backups verified and restorable.
    executed_at:
      type: string
      format: date-time
      description: UTC timestamp when the drill was executed.
      example: '2026-07-05T04:00:00Z'
    executed_by:
      type: string
      description: Actor that executed the drill.
      example: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
RestoreRequest:
  type: object
  description: >-
    Request body for triggering a restore from a backup. All field names use
    snake_case.
  required:
    - backup_id
  additionalProperties: false
  properties:
    backup_id:
      type: string
      description: Identifier of the backup to restore from.
      example: bkp_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
CreateDrillRequest:
  type: object
  description: >-
    Request body for creating a disaster recovery drill. All field names use
    snake_case.
  required:
    - type
  additionalProperties: false
  properties:
    type:
      type: string
      description: Drill type.
      enum:
        - BACKUP_VERIFY
        - RESTORE_SIMULATION
        - FAILOVER
      example: BACKUP_VERIFY
    notes:
      type: string
      description: Optional notes for the drill.
      example: Weekly backup verification drill.
