DictTypePage:
  type: object
  description: Paginated list of dictionary types.
  required: [items, total, page, page_size]
  additionalProperties: false
  properties:
    items:
      type: array
      description: Dictionary types in the current page.
      items:
        $ref: '#/DictType'
    total:
      type: integer
      format: int64
      minimum: 0
      description: Total number of matching dictionary types.
      example: 3
    page:
      type: integer
      format: int32
      minimum: 1
      description: Current page number (1-based).
      example: 1
    page_size:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      description: Number of items per page.
      example: 20
    total_pages:
      type: integer
      format: int32
      minimum: 0
      description: Total number of pages.
      example: 1

