BatchI18nResult:
  type: object
  description: Result of a batch i18n import operation.
  required: [imported, skipped]
  additionalProperties: false
  properties:
    imported:
      type: integer
      format: int32
      minimum: 0
      description: Number of resources created or updated.
      example: 2
    skipped:
      type: integer
      format: int32
      minimum: 0
      description: Number of resources skipped due to validation errors.
      example: 0
