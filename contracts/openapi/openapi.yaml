# Function: OpenGeoBot Cloud Control API root contract (OpenAPI 3.1.0)
# Time: 2026-07-04
# Author: AxeXie
openapi: 3.1.0
info:
  title: OpenGeoBot Cloud Control API
  version: 1.0.0
  description: >-
    Cloud control plane REST contract for the OpenGeoBot one-brain-multi-control
    platform. Health endpoints follow the deployment health contract
    (SM-SERVICE-HEALTH). All field names use snake_case. Error responses conform
    to the platform ProblemDetails model with stable `code` and `message_key`.
  contact:
    name: OpenGeoBot Platform
servers:
  - url: http://localhost:8080/api/v1
    description: Development server
tags:
  - name: health
    description: Service health, readiness and version info
  - name: auth
    description: Authentication, session and profile management
  - name: user
    description: >-
      User account management, status transitions and role/org assignment
      (F-PLATFORM-002).
  - name: organization
    description: >-
      Organization tree management for the platform IAM domain
      (F-PLATFORM-002).
  - name: role
    description: >-
      Role definition and permission assignment management (F-PLATFORM-002).
  - name: permission
    description: >-
      Permission code queries used by the authorization module
      (F-PLATFORM-002).
  - name: dictionary
    description: >-
      Platform dictionary types and items for enumerated values (SM-VERSIONED-CONFIG).
  - name: i18n
    description: Internationalization resource management for frontend-visible text.
  - name: config
    description: Platform configuration management (F-PLATFORM-004)
  - name: audit
    description: Operation audit log queries (F-PLATFORM-004)
  - name: export
    description: Asynchronous data export (F-PLATFORM-004)
  - name: skill
    description: >-
      Skill lifecycle management — registration, versioning, publish, enable
      and disable (F-SKILL-001).
  - name: safety
    description: >-
      Emergency stop, reset and safety state management (F-SAFETY-001).
  - name: map
    description: >-
      Map, area and restricted area management (F-MAP-001).
  - name: media
    description: >-
      Media object upload, download and management (F-MEDIA-001).
  - name: trace
    description: >-
      Trace span and fact event inspection for replay (F-TRACE-001).
  - name: mission
    description: >-
      Mission creation, planning, approval, templates and execution control
      (F-MISSION-001/002/003).
  - name: robot
    description: >-
      Robot registration, status transitions and capability management
      (F-ROBOT-001).
  - name: mcp-tool
    description: >-
      MCP tool gateway — tool registration, invocation and invocation logging
      (F-MCP-001).
  - name: policy
    description: >-
      Policy management — creation, versioned publishing and mission
      compliance evaluation (F-POLICY-001).
paths:
  /health/live:
    get:
      tags: [health]
      summary: Liveness probe
      description: >-
        Indicates the process is alive and able to handle requests. A 200 means
        the application is running; it does not imply dependencies are ready.
      operationId: getHealthLive
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: './schemas/service-health.yaml#/ServiceHealth'
              example:
                service_name: cloud-control
                state: HEALTHY
                last_check_at: '2026-07-03T08:00:00Z'
                dependencies: []
                version: 1.0.0
        '503':
          description: Service is not alive
          content:
            application/problem+json:
              schema:
                $ref: './schemas/error.yaml#/ProblemDetails'
  /health/ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: >-
        Indicates whether the service is ready to receive traffic. Returns 200
        when critical dependencies (e.g. database, NATS) are reachable, and 503
        when any required dependency is not ready.
      operationId: getHealthReady
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: './schemas/service-health.yaml#/ServiceHealth'
              example:
                service_name: cloud-control
                state: HEALTHY
                last_check_at: '2026-07-03T08:00:00Z'
                dependencies:
                  - name: postgresql
                    state: HEALTHY
                  - name: nats
                    state: HEALTHY
                version: 1.0.0
        '503':
          description: Service is not ready
          content:
            application/problem+json:
              schema:
                $ref: './schemas/error.yaml#/ProblemDetails'
              example:
                type: about:blank
                title: Service not ready
                status: 503
                code: HEALTH_NOT_READY
                message_key: error.health.not_ready
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                instance: /health/ready
  /health/info:
    get:
      tags: [health]
      summary: Build and version info
      description: >-
        Returns version, build and runtime information for diagnostics. This
        endpoint is read-only and does not reflect dependency health.
      operationId: getHealthInfo
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
              example:
                service_name: cloud-control
                version: 1.0.0
                build_commit: a1b2c3d
                build_time: '2026-07-03T07:00:00Z'
                java_version: 21
                spring_boot_version: 3.3.0
