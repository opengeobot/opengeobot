      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: './schemas/iam-rbac-events.yaml#/RoleChangedV1'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: iam.role_changed.v1
              event_version: '1'
              occurred_at: '2026-07-04T10:30:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: usr_01J00000000000000000000001
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                role_id: rol_01J00000000000000000000003
                action: CREATED
                occurred_at: '2026-07-04T10:30:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    AuthorizationChangedEvent:
      description: >-
        Authorization changed event. The payload is a platform EventEnvelope
