              event_version: '1'
              occurred_at: '2026-07-04T08:30:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: usr_01J00000000000000000000001
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                user_id: usr_01J00000000000000000000001
                session_id: sess_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                reason: USER_LOGOUT
                occurred_at: '2026-07-04T08:30:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    UserCreatedEvent:
      description: >-
        User created event. The payload is a platform EventEnvelope whose
        `event_type` is `iam.user_created.v1` and whose `data` carries the
