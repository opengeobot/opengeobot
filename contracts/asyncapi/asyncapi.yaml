# Function: OpenGeoBot event streams contract (AsyncAPI 3.0.0)
# Time: 2026-07-04
# Author: AxeXie
asyncapi: 3.0.0
info:
  title: OpenGeoBot Event Streams
  version: 1.0.0
  description: >-
    Event channel definitions for the OpenGeoBot platform. NATS JetStream is the
    primary transport for domain events; a WebSocket gateway streams events to
    frontends. Every event is wrapped in the platform EventEnvelope so that
    `trace_id` links the event to the end-to-end trace context.
  contact:
    name: OpenGeoBot Platform
servers:
  nats:
    host: nats://localhost:4222
    protocol: nats
    description: NATS JetStream broker used for domain events.
  websocket:
    host: ws://localhost:8080
    protocol: ws
    description: WebSocket gateway delivering events to the web console.
channels:
  healthChanged:
    address: opengeobot.dev.service.event.health_changed.v1
    description: >-
      Emitted when a service transitions between SM-SERVICE-HEALTH states
      (UNKNOWN/STARTING/HEALTHY/DEGRADED/UNHEALTHY/STOPPED).
    messages:
      healthChanged:
        $ref: '#/components/messages/HealthChangedEvent'
  webEvents:
    address: /ws/v1/events
    description: >-
      WebSocket channel streaming the generic platform EventEnvelope to
      authorized frontend subscribers. Clients filter by `event_type`.
    messages:
      eventEnvelope:
        $ref: '#/components/messages/EventEnvelope'
  userLoggedIn:
    address: opengeobot.dev.iam.event.user_logged_in.v1
    description: >-
      Emitted when a user successfully authenticates and a new session is
      issued. The payload is a platform EventEnvelope whose `event_type` is
      `iam.user_logged_in.v1`.
    messages:
      userLoggedIn:
        $ref: '#/components/messages/UserLoggedInEvent'
  sessionRefreshed:
    address: opengeobot.dev.iam.event.session_refreshed.v1
    description: >-
      Emitted when a session is refreshed via a refresh token. The payload is
      a platform EventEnvelope whose `event_type` is
      `iam.session_refreshed.v1`.
    messages:
      sessionRefreshed:
        $ref: '#/components/messages/SessionRefreshedEvent'
  sessionRevoked:
    address: opengeobot.dev.iam.event.session_revoked.v1
    description: >-
      Emitted when a session is revoked, either by an explicit logout or by
      an administrative/forced revocation. The payload is a platform
      EventEnvelope whose `event_type` is `iam.session_revoked.v1`.
    messages:
      sessionRevoked:
        $ref: '#/components/messages/SessionRevokedEvent'
  userCreated:
    address: opengeobot.dev.iam.event.user_created.v1
    description: >-
      Emitted when a new user account is created. The payload is a platform
      EventEnvelope whose `event_type` is `iam.user_created.v1`.
    messages:
      userCreated:
        $ref: '#/components/messages/UserCreatedEvent'
  userStatusChanged:
    address: opengeobot.dev.iam.event.user_status_changed.v1
    description: >-
      Emitted when a user account status transitions (enable, disable or lock).
      The payload is a platform EventEnvelope whose `event_type` is
      `iam.user_status_changed.v1`.
    messages:
      userStatusChanged:
        $ref: '#/components/messages/UserStatusChangedEvent'
  userRolesChanged:
    address: opengeobot.dev.iam.event.user_roles_changed.v1
    description: >-
      Emitted when the set of roles assigned to a user is replaced. The
      payload is a platform EventEnvelope whose `event_type` is
      `iam.user_roles_changed.v1`.
    messages:
      userRolesChanged:
        $ref: '#/components/messages/UserRolesChangedEvent'
  roleChanged:
    address: opengeobot.dev.iam.event.role_changed.v1
    description: >-
      Emitted when a role is created, updated, deleted or has its permissions
      replaced. The payload is a platform EventEnvelope whose `event_type` is
      `iam.role_changed.v1`.
    messages:
      roleChanged:
        $ref: '#/components/messages/RoleChangedEvent'
  authorizationChanged:
    address: opengeobot.dev.iam.event.authorization_changed.v1
    description: >-
      Emitted when the effective authorization of a user changes, either
      because the user's roles were reassigned or because a role the user holds
      had its permissions replaced. Consumers should invalidate cached
      authorization decisions for the affected user. The payload is a platform
      EventEnvelope whose `event_type` is `iam.authorization_changed.v1`.
    messages:
      authorizationChanged:
        $ref: '#/components/messages/AuthorizationChangedEvent'
  platformDictionaryChanged:
    address: opengeobot.dev.governance.event.platform_dictionary_changed.v1
    description: >-
      Emitted when a platform dictionary type or its items change (created,
      updated, published, archived or deleted). Consumers reload the affected
      dictionary type at the given version.
    messages:
      platformDictionaryChanged:
        $ref: '#/components/messages/PlatformDictionaryChangedEvent'
  platformI18nChanged:
    address: opengeobot.dev.governance.event.platform_i18n_changed.v1
    description: >-
      Emitted when platform i18n resources change (created, updated,
      batch-imported or deleted). Consumers reload the affected resource keys
      for the given locale.
    messages:
      platformI18nChanged:
        $ref: '#/components/messages/PlatformI18nChangedEvent'
  platformConfigChanged:
    address: opengeobot.dev.governance.event.platform_config_changed.v1
    description: >-
      Emitted when a platform config entry is created or updated via the config
      API. Consumers reload the affected config key at the new version.
    messages:
      platformConfigChanged:
        $ref: '#/components/messages/PlatformConfigChangedEvent'
  exportRequested:
    address: opengeobot.dev.governance.event.export_requested.v1
    description: >-
      Emitted when an asynchronous export task is created and queued for
      processing. Consumers may use this to track export lifecycle.
    messages:
      exportRequested:
        $ref: '#/components/messages/ExportRequestedEvent'
  exportCompleted:
    address: opengeobot.dev.governance.event.export_completed.v1
    description: >-
      Emitted when an export task reaches a terminal state (SUCCEEDED or
      FAILED). Consumers may notify the requester or clean up resources.
    messages:
      exportCompleted:
        $ref: '#/components/messages/ExportCompletedEvent'
  robotRegistered:
    address: opengeobot.dev.robot.event.robot_registered.v1
    description: >-
      Emitted when a new robot is registered. The payload is a platform
      EventEnvelope whose `event_type` is `robot.registered.v1`.
    messages:
      robotRegistered:
        $ref: '#/components/messages/RobotRegisteredEvent'
  robotStatusChanged:
    address: opengeobot.dev.robot.event.robot_status_changed.v1
    description: >-
      Emitted when a robot operational status transitions. The payload is a
      platform EventEnvelope whose `event_type` is
      `robot.status_changed.v1`.
    messages:
      robotStatusChanged:
        $ref: '#/components/messages/RobotStatusChangedEvent'
  missionCreated:
    address: opengeobot.dev.mission.event.mission_created.v1
    description: >-
      Emitted when a new mission is created. The payload is a platform
      EventEnvelope whose `event_type` is `mission.created.v1`.
    messages:
      missionCreated:
        $ref: '#/components/messages/MissionCreatedEvent'
  missionPlanRevised:
    address: opengeobot.dev.mission.event.mission_plan_revised.v1
    description: >-
      Emitted when a mission plan (step list) is revised. The payload is a
      platform EventEnvelope whose `event_type` is `mission.plan_revised.v1`.
    messages:
      missionPlanRevised:
        $ref: '#/components/messages/MissionPlanRevisedEvent'
  missionStarted:
    address: opengeobot.dev.mission.event.mission_started.v1
    description: >-
      Emitted when a mission transitions to EXECUTING. The payload is a platform
      EventEnvelope whose `event_type` is `mission.started.v1`.
    messages:
      missionStarted:
        $ref: '#/components/messages/MissionStartedEvent'
  missionCompleted:
    address: opengeobot.dev.mission.event.mission_completed.v1
    description: >-
      Emitted when a mission reaches the COMPLETED terminal state. The payload
      is a platform EventEnvelope whose `event_type` is
      `mission.completed.v1`.
    messages:
      missionCompleted:
        $ref: '#/components/messages/MissionCompletedEvent'
  missionFailed:
    address: opengeobot.dev.mission.event.mission_failed.v1
    description: >-
      Emitted when a mission reaches the FAILED terminal state. The payload is a
      platform EventEnvelope whose `event_type` is `mission.failed.v1`.
    messages:
      missionFailed:
        $ref: '#/components/messages/MissionFailedEvent'
  missionCancelled:
    address: opengeobot.dev.mission.event.mission_cancelled.v1
    description: >-
      Emitted when a mission is cancelled from a non-terminal state. The payload
      is a platform EventEnvelope whose `event_type` is
      `mission.cancelled.v1`.
    messages:
      missionCancelled:
        $ref: '#/components/messages/MissionCancelledEvent'
  skillRegistered:
    address: opengeobot.dev.skill.event.skill_registered.v1
    description: >-
      Emitted when a new skill is registered in the skill registry. The payload
      is a platform EventEnvelope whose `event_type` is
      `skill.registered.v1`. Consumers may invalidate skill caches or trigger
      edge distribution of the new skill definition.
    messages:
      skillRegistered:
        $ref: '#/components/messages/SkillRegisteredEvent'
  skillStatusChanged:
    address: opengeobot.dev.skill.event.skill_status_changed.v1
    description: >-
      Emitted when a skill transitions between lifecycle states
      (DRAFT → PUBLISHED → DEPRECATED/DISABLED and back). The payload is a
      platform EventEnvelope whose `event_type` is
      `skill.status_changed.v1`. Consumers use this to enable or disable skill
      execution at the edge.
    messages:
      skillStatusChanged:
        $ref: '#/components/messages/SkillStatusChangedEvent'
  safetyEmergencyStop:
    address: opengeobot.dev.policy.event.safety_emergency_stop.v1
    description: >-
      Emitted when an emergency stop is triggered for a robot or globally.
      The payload is a platform EventEnvelope whose `event_type` is
      `safety.emergency_stop.v1`. Edge Safety Gateways must latch and halt all
      physical motion immediately upon receiving this event.
    messages:
      safetyEmergencyStop:
        $ref: '#/components/messages/SafetyEmergencyStopEvent'
  safetyReset:
    address: opengeobot.dev.policy.event.safety_reset.v1
    description: >-
      Emitted when the safety state is reset from EMERGENCY_STOPPED back to
      NORMAL. The payload is a platform EventEnvelope whose `event_type` is
      `safety.reset.v1`. Consumers may resume normal operation after the edge
      Safety Gateway confirms the reset.
    messages:
      safetyReset:
        $ref: '#/components/messages/SafetyResetEvent'
  alarmTriggered:
    address: opengeobot.dev.ops.event.alarm_triggered.v1
    description: >-
      Emitted when an alarm rule condition is met and a new alarm event is
      created. The payload is a platform EventEnvelope whose `event_type` is
      `alarm.triggered.v1`. Consumers may display the alarm in the operations
      dashboard or forward it to external notification systems.
    messages:
      alarmTriggered:
        $ref: '#/components/messages/AlarmTriggeredEvent'
  alarmAcknowledged:
    address: opengeobot.dev.ops.event.alarm_acknowledged.v1
    description: >-
      Emitted when an alarm is acknowledged by an operator. The payload is a
      platform EventEnvelope whose `event_type` is `alarm.acknowledged.v1`.
    messages:
      alarmAcknowledged:
        $ref: '#/components/messages/AlarmAcknowledgedEvent'
  alarmResolved:
    address: opengeobot.dev.ops.event.alarm_resolved.v1
    description: >-
      Emitted when an alarm is resolved, either manually or automatically.
      The payload is a platform EventEnvelope whose `event_type` is
      `alarm.resolved.v1`.
    messages:
      alarmResolved:
        $ref: '#/components/messages/AlarmResolvedEvent'
operations:
  publishHealthChanged:
    action: send
    title: Publish service health changed event
    channel:
      $ref: '#/channels/healthChanged'
    messages:
      - $ref: '#/components/messages/HealthChangedEvent'
  subscribeWebEvents:
    action: receive
    title: Subscribe to platform events over WebSocket
    channel:
      $ref: '#/channels/webEvents'
    messages:
      - $ref: '#/components/messages/EventEnvelope'
  publishUserLoggedIn:
    action: send
    title: Publish user logged in event
    channel:
      $ref: '#/channels/userLoggedIn'
    messages:
      - $ref: '#/components/messages/UserLoggedInEvent'
  publishSessionRefreshed:
    action: send
    title: Publish session refreshed event
    channel:
      $ref: '#/channels/sessionRefreshed'
    messages:
      - $ref: '#/components/messages/SessionRefreshedEvent'
  publishSessionRevoked:
    action: send
    title: Publish session revoked event
    channel:
      $ref: '#/channels/sessionRevoked'
    messages:
      - $ref: '#/components/messages/SessionRevokedEvent'
  publishUserCreated:
    action: send
    title: Publish user created event
    channel:
      $ref: '#/channels/userCreated'
    messages:
      - $ref: '#/components/messages/UserCreatedEvent'
  publishUserStatusChanged:
    action: send
    title: Publish user status changed event
    channel:
      $ref: '#/channels/userStatusChanged'
    messages:
      - $ref: '#/components/messages/UserStatusChangedEvent'
  publishUserRolesChanged:
    action: send
    title: Publish user roles changed event
    channel:
      $ref: '#/channels/userRolesChanged'
    messages:
      - $ref: '#/components/messages/UserRolesChangedEvent'
  publishRoleChanged:
    action: send
    title: Publish role changed event
    channel:
      $ref: '#/channels/roleChanged'
    messages:
      - $ref: '#/components/messages/RoleChangedEvent'
  publishAuthorizationChanged:
    action: send
    title: Publish authorization changed event
    channel:
      $ref: '#/channels/authorizationChanged'
    messages:
      - $ref: '#/components/messages/AuthorizationChangedEvent'
  publishPlatformDictionaryChanged:
    action: send
    title: Publish platform dictionary changed event
    channel:
      $ref: '#/channels/platformDictionaryChanged'
    messages:
      - $ref: '#/components/messages/PlatformDictionaryChangedEvent'
  publishPlatformI18nChanged:
    action: send
    title: Publish platform i18n changed event
    channel:
      $ref: '#/channels/platformI18nChanged'
    messages:
      - $ref: '#/components/messages/PlatformI18nChangedEvent'
  publishPlatformConfigChanged:
    action: send
    title: Publish platform config changed event
    channel:
      $ref: '#/channels/platformConfigChanged'
    messages:
      - $ref: '#/components/messages/PlatformConfigChangedEvent'
  publishExportRequested:
    action: send
    title: Publish export requested event
    channel:
      $ref: '#/channels/exportRequested'
    messages:
      - $ref: '#/components/messages/ExportRequestedEvent'
  publishExportCompleted:
    action: send
    title: Publish export completed event
    channel:
      $ref: '#/channels/exportCompleted'
    messages:
      - $ref: '#/components/messages/ExportCompletedEvent'
  publishRobotRegistered:
    action: send
    title: Publish robot registered event
    channel:
      $ref: '#/channels/robotRegistered'
    messages:
      - $ref: '#/components/messages/RobotRegisteredEvent'
  publishRobotStatusChanged:
    action: send
    title: Publish robot status changed event
    channel:
      $ref: '#/channels/robotStatusChanged'
    messages:
      - $ref: '#/components/messages/RobotStatusChangedEvent'
  publishMissionCreated:
    action: send
    title: Publish mission created event
    channel:
      $ref: '#/channels/missionCreated'
    messages:
      - $ref: '#/components/messages/MissionCreatedEvent'
  publishMissionPlanRevised:
    action: send
    title: Publish mission plan revised event
    channel:
      $ref: '#/channels/missionPlanRevised'
    messages:
      - $ref: '#/components/messages/MissionPlanRevisedEvent'
  publishMissionStarted:
    action: send
    title: Publish mission started event
    channel:
      $ref: '#/channels/missionStarted'
    messages:
      - $ref: '#/components/messages/MissionStartedEvent'
  publishMissionCompleted:
    action: send
    title: Publish mission completed event
    channel:
      $ref: '#/channels/missionCompleted'
    messages:
      - $ref: '#/components/messages/MissionCompletedEvent'
  publishMissionFailed:
    action: send
    title: Publish mission failed event
    channel:
      $ref: '#/channels/missionFailed'
    messages:
      - $ref: '#/components/messages/MissionFailedEvent'
  publishMissionCancelled:
    action: send
    title: Publish mission cancelled event
    channel:
      $ref: '#/channels/missionCancelled'
    messages:
      - $ref: '#/components/messages/MissionCancelledEvent'
  publishSkillRegistered:
    action: send
    title: Publish skill registered event
    channel:
      $ref: '#/channels/skillRegistered'
    messages:
      - $ref: '#/components/messages/SkillRegisteredEvent'
  publishSkillStatusChanged:
    action: send
    title: Publish skill status changed event
    channel:
      $ref: '#/channels/skillStatusChanged'
    messages:
      - $ref: '#/components/messages/SkillStatusChangedEvent'
  publishSafetyEmergencyStop:
    action: send
    title: Publish safety emergency stop event
    channel:
      $ref: '#/channels/safetyEmergencyStop'
    messages:
      - $ref: '#/components/messages/SafetyEmergencyStopEvent'
  publishSafetyReset:
    action: send
    title: Publish safety reset event
    channel:
      $ref: '#/channels/safetyReset'
    messages:
      - $ref: '#/components/messages/SafetyResetEvent'
  publishAlarmTriggered:
    action: send
    title: Publish alarm triggered event
    channel:
      $ref: '#/channels/alarmTriggered'
    messages:
      - $ref: '#/components/messages/AlarmTriggeredEvent'
  publishAlarmAcknowledged:
    action: send
    title: Publish alarm acknowledged event
    channel:
      $ref: '#/channels/alarmAcknowledged'
    messages:
      - $ref: '#/components/messages/AlarmAcknowledgedEvent'
  publishAlarmResolved:
    action: send
    title: Publish alarm resolved event
    channel:
      $ref: '#/channels/alarmResolved'
    messages:
      - $ref: '#/components/messages/AlarmResolvedEvent'
components:
  messages:
    EventEnvelope:
      description: Generic platform event envelope delivered to web clients.
      headers:
        type: object
        properties:
          event_type:
            type: string
            description: Dotted event type used for client-side filtering.
            example: service.health_changed.v1
          trace_id:
            type: string
            description: End-to-end trace identifier.
      contentType: application/json
      payload:
        $ref: './schemas/event-envelope.yaml#/EventEnvelope'
    HealthChangedEvent:
      description: >-
        Service health changed event. The payload is a platform EventEnvelope
        whose `event_type` is `service.health_changed.v1` and whose `data`
        carries the ServiceHealth snapshot.
      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: '../openapi/schemas/service-health.yaml#/ServiceHealth'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: service.health_changed.v1
              event_version: '1'
              occurred_at: '2026-07-03T08:00:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: service
                id: cloud-control
              data:
                service_name: cloud-control
                state: DEGRADED
                last_check_at: '2026-07-03T08:00:00Z'
                dependencies:
                  - name: postgresql
                    state: HEALTHY
                  - name: nats
                    state: UNHEALTHY
                version: 1.0.0
    PlatformConfigChangedEvent:
      description: >-
        Platform config changed event. The payload is a platform EventEnvelope
        whose `event_type` is `governance.platform_config_changed.v1` and whose
        `data` carries the PlatformConfigChangedV1 payload.
      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: './schemas/config-events.yaml#/PlatformConfigChangedV1'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: governance.platform_config_changed.v1
              event_version: '1'
              occurred_at: '2026-07-04T10:00:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                config_key: platform.session.timeout_minutes
                old_value: '120'
                new_value: '90'
                module: iam
                occurred_at: '2026-07-04T10:00:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    ExportRequestedEvent:
      description: >-
        Export requested event. The payload is a platform EventEnvelope whose
        `event_type` is `governance.export_requested.v1` and whose `data`
        carries the ExportRequestedV1 payload.
      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: './schemas/config-events.yaml#/ExportRequestedV1'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: governance.export_requested.v1
              event_version: '1'
              occurred_at: '2026-07-04T08:00:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                export_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                resource_type: audit_log
                format: csv
                requested_by: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                occurred_at: '2026-07-04T08:00:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    ExportCompletedEvent:
      description: >-
        Export completed event. The payload is a platform EventEnvelope whose
        `event_type` is `governance.export_completed.v1` and whose `data`
        carries the ExportCompletedV1 payload.
      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: './schemas/config-events.yaml#/ExportCompletedV1'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: governance.export_completed.v1
              event_version: '1'
              occurred_at: '2026-07-04T08:00:12Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: service
                id: cloud-control
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                export_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                status: SUCCEEDED
                file_url: https://minio.local/opengeobot/exports/01JX2Q3R4T5V6W7X8Y9Z0A1B2C.csv
                file_size: 204800
                occurred_at: '2026-07-04T08:00:12Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    UserLoggedInEvent:
      description: >-
        User logged in event. The payload is a platform EventEnvelope whose
        `event_type` is `iam.user_logged_in.v1` and whose `data` carries the
        UserLoggedInV1 payload.
      contentType: application/json
      payload:
        allOf:
          - $ref: './schemas/event-envelope.yaml#/EventEnvelope'
          - type: object
            properties:
              data:
                $ref: './schemas/iam-events.yaml#/UserLoggedInV1'
            example:
              event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              event_type: iam.user_logged_in.v1
              event_version: '1'
              occurred_at: '2026-07-04T08:00:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: usr_01J00000000000000000000001
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
