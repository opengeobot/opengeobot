              occurred_at: '2026-07-04T08:00:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: usr_01J00000000000000000000001
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                user_id: usr_01J00000000000000000000001
                username: admin
                session_id: sess_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                occurred_at: '2026-07-04T08:00:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                source_ip: 192.168.1.42
                user_agent: Mozilla/5.0 (X11; Linux x86_64) Chrome/126.0
    SessionRefreshedEvent:
      description: >-
        Session refreshed event. The payload is a platform EventEnvelope whose
