              event_version: '1'
              occurred_at: '2026-07-04T08:15:00Z'
              producer: cloud-control
              trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
              actor:
                type: user
                id: usr_01J00000000000000000000001
              data:
                event_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                user_id: usr_01J00000000000000000000001
                session_id: sess_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
                occurred_at: '2026-07-04T08:15:00Z'
                trace_id: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    SessionRevokedEvent:
      description: >-
        Session revoked event. The payload is a platform EventEnvelope whose
        `event_type` is `iam.session_revoked.v1` and whose `data` carries the
