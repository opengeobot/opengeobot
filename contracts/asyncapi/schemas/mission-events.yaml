    - mission_id
    - robot_id
    - occurred_at
    - trace_id
  additionalProperties: false
  properties:
    event_id:
      type: string
      description: Unique identifier of the event occurrence (ULID or UUID).
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    mission_id:
      type: string
      description: Stable public identifier of the completed mission.
      example: msn_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    robot_id:
      type: string
      description: Public identifier of the robot that executed the mission.
      example: rbt_01J00000000000000000000001
    completed_at:
      type: string
      format: date-time
      description: UTC timestamp when the mission completed.
      example: '2026-07-05T10:12:30Z'
    occurred_at:
      type: string
      format: date-time
      description: UTC timestamp when the completed event was recorded.
      example: '2026-07-05T10:12:30Z'
    trace_id:
      type: string
      description: End-to-end trace identifier linking completion to logs and audit.
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
MissionFailedV1:
  type: object
  description: >-
    Payload emitted when a mission reaches the FAILED terminal state. Carried as
    the `data` field of the platform EventEnvelope with `event_type` equal to
    `mission.failed.v1`. All field names use snake_case.
  required:
    - event_id
    - mission_id
    - robot_id
    - occurred_at
    - trace_id
  additionalProperties: false
  properties:
    event_id:
      type: string
      description: Unique identifier of the event occurrence (ULID or UUID).
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    mission_id:
      type: string
      description: Stable public identifier of the failed mission.
      example: msn_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    robot_id:
      type: string
      description: Public identifier of the robot that was executing the mission.
      example: rbt_01J00000000000000000000001
    failed_reason:
      type: string
      description: Reason text explaining why the mission failed.
      example: Step 2 skill execution timed out
    failed_at:
      type: string
      format: date-time
      description: UTC timestamp when the mission failed.
      example: '2026-07-05T10:08:00Z'
    occurred_at:
      type: string
      format: date-time
      description: UTC timestamp when the failed event was recorded.
      example: '2026-07-05T10:08:00Z'
    trace_id:
      type: string
      description: End-to-end trace identifier linking the failure to logs and audit.
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
MissionCancelledV1:
  type: object
  description: >-
    Payload emitted when a mission is cancelled from a non-terminal state.
    Carried as the `data` field of the platform EventEnvelope with `event_type`
    equal to `mission.cancelled.v1`. All field names use snake_case.
  required:
    - event_id
    - mission_id
    - robot_id
    - occurred_at
    - trace_id
  additionalProperties: false
  properties:
    event_id:
      type: string
      description: Unique identifier of the event occurrence (ULID or UUID).
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    mission_id:
      type: string
      description: Stable public identifier of the cancelled mission.
      example: msn_01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    robot_id:
      type: string
      description: Public identifier of the robot assigned to the mission.
      example: rbt_01J00000000000000000000001
    previous_status:
      type: string
      description: Mission status immediately before cancellation.
      enum:
        - PENDING
        - PLANNING
        - READY
        - EXECUTING
        - PAUSED
      example: EXECUTING
    cancelled_by:
      type: string
      description: Identifier of the actor that cancelled the mission.
      example: user-01JX2Q3R4T5V6W7X8Y9Z0A1B2C
    cancelled_at:
      type: string
      format: date-time
      description: UTC timestamp when the mission was cancelled.
      example: '2026-07-05T10:05:00Z'
    occurred_at:
      type: string
      format: date-time
      description: UTC timestamp when the cancelled event was recorded.
      example: '2026-07-05T10:05:00Z'
    trace_id:
      type: string
      description: End-to-end trace identifier linking the cancellation to logs and audit.
      example: 01JX2Q3R4T5V6W7X8Y9Z0A1B2C
