# Function: Cloud control default application configuration
# Time: 2026-07-03
# Author: AxeXie

spring:
  application:
    name: cloud-control
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opengeobot}?stringtype=unspecified
    username: ${DB_USER:opengeobot}
    password: ${DB_PASSWORD:opengeobot_dev}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  version: 0.1.0-SNAPSHOT

platform:
  jwt:
    secret: ${JWT_SECRET:opengeobot-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiry-seconds: 1800
    refresh-token-expiry-days: 7

logging:
  level:
    io.opengeobot: INFO
