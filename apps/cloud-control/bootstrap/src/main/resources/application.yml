# Function: Cloud control default application configuration
# Time: 2026-07-03
# Author: AxeXie

spring:
  application:
    name: cloud-control
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opengeobot}?stringtype=unspecified
    username: ${DB_USER:opengeobot}
    password: ${DB_PASSWORD:opengeobot_dev}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  version: 0.1.0-SNAPSHOT

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

platform:
  jwt:
    secret: ${JWT_SECRET:opengeobot-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiry-seconds: 1800
    refresh-token-expiry-days: 7
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:opengeobot}
    secret-key: ${MINIO_SECRET_KEY:opengeobot_dev}
    bucket: ${MINIO_BUCKET:opengeobot}

opengeobot:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
    enabled: true
    jetstream:
      enabled: true
      stream: opengeobot-events
    outbox:
      relay-enabled: true
      relay-interval-ms: 5000
      batch-size: 100
      max-retry-count: 50
      retry-backoff-ms: 10000
  edge:
    safety:
      gateway-id: ${EDGE_GATEWAY_ID:edge_01}
  mission:
    max-replan-count: 3

logging:
  level:
    io.opengeobot: INFO
