        - contracts/openapi/openapi.yaml
        - contracts/asyncapi/asyncapi.yaml
      backend:
        - apps/cloud-control/platform-common/
        - apps/cloud-control/bootstrap/
        - scripts/dev.sh
        - scripts/dev.ps1
      frontend:
        - apps/web-console/src/main.ts
        - apps/web-console/src/App.vue
      deployment:
        - deploy/compose/compose.yml
        - reports/deployment/F-ENGINEERING-001-deployment-summary.md
      observability:
        - deploy/observability/vmagent.yml
        - reports/observability/F-ENGINEERING-001-observability-summary.md
      security_reports:
        - reports/security/m0-security-report.md
        - reports/security/F-ENGINEERING-001-security-checklist.md
