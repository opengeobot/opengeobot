    pin_status: UNPINNED
    required_by: [F-MCP-001, F-MISSION-001]
  - id: EXT-ROSCLAW
    official_source: "https://www.rosclaw.io/runtime"
    pin_status: UNPINNED
    required_by: [F-EDGE-002, F-ADAPTER-001]
  - id: EXT-ROS2-JAZZY
