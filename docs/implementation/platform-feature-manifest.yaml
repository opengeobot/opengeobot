    platform_capability_profile: ENGINEERING_CORE
    deployment_targets: [BUILD]
    frontend:
      page_ids: []
      required_view_states: []
    backend:
      modules: [build-platform, contract-tooling, ci]
      use_case_ids: [UC-ENGINEERING-BOOTSTRAP, UC-ENGINEERING-TEST]
    data:
      owner_schemas: []
      tables: []
      state_machine_ids: []
    security:
      risk_level: R0_READ_ONLY
      permission_codes: []
      requires_edge_safety: false
    contracts: [repository-layout, dev-script-contract, ci-gates]
    events: []
    observability: [LOG, METRIC]
    verification:
      acceptance_ids: [C23, C24]
      required_tests: [CONTRACT, INTEGRATION, E2E, SECURITY]
      done_evidence: [CONTRACTS, BACKEND, FRONTEND, TEST_REPORTS, RUNBOOK]
