schema_version: "1.1"
baseline: "2026-07-03"
sources:
  - "docs/AI开发约束与平台公共能力规范 V1.0.md"
  - "docs/平台功能与数据状态统一实施蓝图 V1.0.md"
  - "docs/一脑多控平台详细设计说明书 V1.0.pdf"
  - "docs/adr/ADR-0001-统一技术基线与前端主栈.md"

architecture_decisions:
  - "docs/adr/ADR-0001-统一技术基线与前端主栈.md"

architecture:
  cloud_backend: JAVA21_SPRING_BOOT3_MYBATIS_PLUS_AND_PYTHON312
  frontend: VUE3_TYPESCRIPT_VITE_PRIMARY_REACT_ADR_ONLY_WEBSOCKET
  agent_runtime: QWENPAW_VIA_AGENT_RUNTIME_PROVIDER
  tool_protocol: MCP_PRIMARY_HTTP_GRPC_AUXILIARY
  edge_runtime: ROSCLAW_EDGE_RUNTIME
  ros2: ROS2_DDS_ROSBRIDGE_ZENOH_PRIMARY
  ros1: ROS1_BRIDGE_ROSBRIDGE_SUITE_CUSTOM_GATEWAY_COMPATIBILITY
  constrained_network: ZENOH
  database: POSTGRESQL_TIMESCALEDB_OPTIONAL
  object_storage: MINIO_S3
  vector_database: PGVECTOR
  messaging: NATS_JETSTREAM
  monitoring: VMAGENT_VICTORIAMETRICS_GRAFANA
  logging: VECTOR_LOKI_POSTGRESQL_AUDIT
  alerting: GRAFANA_ALERTING_OR_PLATFORM_ALARM_SERVICE

mandatory_done_evidence: [DEPLOYMENT, OBSERVABILITY, SECURITY_REPORTS, TEST_REPORTS, RUNBOOK]

platform_capabilities:
  CONTRACT_GOVERNANCE: F-ENGINEERING-001
  ERROR_MODEL: F-ENGINEERING-001
  EVENT_ENVELOPE: F-ENGINEERING-001
  OBSERVABILITY: F-ENGINEERING-001
  TIME_ID: F-ENGINEERING-001
  TRACE_CONTEXT: F-ENGINEERING-001
  IDENTITY: F-PLATFORM-001
  AUTHORIZATION: F-PLATFORM-002
  DATA_SCOPE: F-PLATFORM-002
  DICTIONARY: F-PLATFORM-003
  I18N: F-PLATFORM-003
  CONFIGURATION: F-PLATFORM-004
  AUDIT: F-PLATFORM-004
  IDEMPOTENCY: F-PLATFORM-004
  OBJECT_METADATA: F-MEDIA-001
  SAFETY_ENFORCEMENT: F-SAFETY-001
  OPERATIONS_GOVERNANCE: F-OPS-001

platform_capability_profiles:
  ENGINEERING_CORE: [CONTRACT_GOVERNANCE, ERROR_MODEL, EVENT_ENVELOPE, OBSERVABILITY, TIME_ID, TRACE_CONTEXT]
  PLATFORM_PROVIDER: [CONTRACT_GOVERNANCE, ERROR_MODEL, EVENT_ENVELOPE, OBSERVABILITY, TIME_ID, TRACE_CONTEXT, IDENTITY, AUTHORIZATION, DATA_SCOPE, DICTIONARY, I18N, CONFIGURATION, AUDIT, IDEMPOTENCY]
  BUSINESS_STANDARD: [CONTRACT_GOVERNANCE, ERROR_MODEL, EVENT_ENVELOPE, OBSERVABILITY, TIME_ID, TRACE_CONTEXT, IDENTITY, AUTHORIZATION, DATA_SCOPE, DICTIONARY, I18N, CONFIGURATION, AUDIT, IDEMPOTENCY, OBJECT_METADATA]
  PHYSICAL_EXECUTION: [CONTRACT_GOVERNANCE, ERROR_MODEL, EVENT_ENVELOPE, OBSERVABILITY, TIME_ID, TRACE_CONTEXT, IDENTITY, AUTHORIZATION, DATA_SCOPE, DICTIONARY, I18N, CONFIGURATION, AUDIT, IDEMPOTENCY, OBJECT_METADATA, SAFETY_ENFORCEMENT]
  OPERATIONS: [CONTRACT_GOVERNANCE, ERROR_MODEL, EVENT_ENVELOPE, OBSERVABILITY, TIME_ID, TRACE_CONTEXT, IDENTITY, AUTHORIZATION, DATA_SCOPE, DICTIONARY, I18N, CONFIGURATION, AUDIT, IDEMPOTENCY, OBJECT_METADATA, OPERATIONS_GOVERNANCE]
