      tables: []
      state_machine_ids: [SM-SERVICE-HEALTH]
    security:
      risk_level: R0_READ_ONLY
      permission_codes: []
      requires_edge_safety: false
    contracts: [compose-profiles, health-contract, configuration-contract]
    events: [service.health_changed.v1]
    observability: [LOG, METRIC, ALARM]
