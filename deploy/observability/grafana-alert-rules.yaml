# OpenGeoBot - Grafana alert rules provisioning (Grafana 11.x)
# Time: 2026-07-09
# Author: AxeXie
# Requires datasource UIDs defined in grafana-datasources.yaml
apiVersion: 1

groups:
  - orgId: 1
    name: opengeobot-platform-health
    folder: OpenGeoBot
    interval: 15s
    rules:
      # -----------------------------------------------------------------------
      # Service unhealthy - up == 0 for 3 consecutive checks (45s)
      # -----------------------------------------------------------------------
      - uid: service-unhealthy
        title: Service Unhealthy
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: victoria-metrics
            model:
              expr: '1 - up'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params:
                      - 0
              refId: B
        noDataState: NoData
        execErrState: Error
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: "Service is unhealthy (up == 0)"
          description: "One or more scraped services have been down for at least 45s (3 consecutive checks at 15s interval)."
        isPaused: false

      # -----------------------------------------------------------------------
      # High error rate - 5xx HTTP responses exceed threshold
      # -----------------------------------------------------------------------
      - uid: high-error-rate
        title: High Error Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: victoria-metrics
            model:
              expr: 'sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params:
                      - 0.5
              refId: B
        noDataState: NoData
        execErrState: Error
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "HTTP server 5xx error rate exceeds 0.5 requests/s over the last 5 minutes."
        isPaused: false

      # -----------------------------------------------------------------------
      # Emergency stop triggered - safety_emergency_stop_total increased
      # -----------------------------------------------------------------------
      - uid: emergency-stop-triggered
        title: Emergency Stop Triggered
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: victoria-metrics
            model:
              expr: 'increase(safety_emergency_stop_total[5m])'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params:
                      - 0
              refId: B
        noDataState: NoData
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Emergency stop was triggered"
          description: "At least one emergency stop event was recorded in the last 5 minutes (safety_emergency_stop_total increased)."
        isPaused: false

      # -----------------------------------------------------------------------
      # Mission failure rate - failed missions exceed threshold
      # -----------------------------------------------------------------------
      - uid: mission-failure-rate
        title: Mission Failure Rate High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: victoria-metrics
            model:
              expr: 'sum(rate(mission_completed_total{result="failed"}[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params:
                      - 0.1
              refId: B
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Mission failure rate is high"
          description: "Mission failure rate exceeds 0.1 failures/s (6 failures/min) over the last 5 minutes."
        isPaused: false

      # -----------------------------------------------------------------------
      # NATS connection lost - nats_connections_active == 0
      # -----------------------------------------------------------------------
      - uid: nats-connection-lost
        title: NATS Connection Lost
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: victoria-metrics
            model:
              expr: 'nats_connections_active'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params:
                      - 1
              refId: B
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "NATS connection lost (active connections == 0)"
          description: "NATS active connections dropped to 0. Messaging backbone may be unreachable."
        isPaused: false
