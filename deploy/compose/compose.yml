# =============================================================================
# OpenGeoBot — Docker Compose (v2)
# Function: M0 engineering scaffold — infra / observability / cloud profiles
# Time: 2026-07-03
# Author: AxeXie
#
# Profiles:
#   infra          -> postgres, nats, minio
#   observability  -> victoriametrics, vmagent, loki, vector, grafana
#   cloud          -> cloud-control, web-console
#   sim            -> qwenpaw, agent-runtime, sim-adapter, edge-gateway, safety-gateway, local-skill-executor
#   rosclaw-sim    -> infra + cloud + qwenpaw + agent-runtime + edge stack +
#                     rosclaw-bridge + ros2-turtlesim + ros2-rosbridge (no sim-adapter)
#   ros2           -> ros2-turtlesim, ros2-adapter (real ROS2 Jazzy environment)
#   ros1-sim       -> ros1-roscore, ros1-turtlesim, ros1-adapter (real ROS1 Noetic environment)
#   zenoh          -> zenoh-bridge-ros2dds (weak network DDS bridge, optional)
#   full           -> all of the above together
#
# Usage:
#   docker compose -f deploy/compose/compose.yml --profile infra up -d
#   docker compose -f deploy/compose/compose.yml --profile sim up -d --build
#   docker compose -f deploy/compose/compose.yml --profile rosclaw-sim up -d --build
#   docker compose -f deploy/compose/compose.yml --profile ros2 up -d --build
#   docker compose -f deploy/compose/compose.yml --profile ros1-sim up -d --build
#   docker compose -f deploy/compose/compose.yml --profile zenoh up -d
#   docker compose -f deploy/compose/compose.yml --profile full up -d --build
#   docker compose -f deploy/compose/compose.yml down
# =============================================================================

name: opengeobot

networks:
  opengeobot-net:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
  minio_data:
  vm_data:
  loki_data:
  grafana_data:

# -----------------------------------------------------------------------------
# Infrastructure profile (infra + full)
# -----------------------------------------------------------------------------
services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: [infra, rosclaw-sim, full]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: opengeobot
      POSTGRES_USER: opengeobot
      POSTGRES_PASSWORD: opengeobot_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengeobot -d opengeobot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nats:
    image: nats:2.10.22-alpine
    profiles: [infra, rosclaw-sim, full]
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js -sd /data -m 8222
    environment:
      NATS_SERVER_STORAGE: /data
    volumes:
      - nats_data:/data
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: [infra, rosclaw-sim, full]
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opengeobot
      MINIO_ROOT_PASSWORD: opengeobot_dev
    volumes:
      - minio_data:/data
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Observability profile (observability + full)
  # ---------------------------------------------------------------------------
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    profiles: [observability, full]
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vmagent:
    image: victoriametrics/vmagent:v1.108.1
    profiles: [observability, full]
    ports:
      - "8429:8429"
    volumes:
      - ../observability/vmagent.yml:/etc/vmagent/config.yml:ro
    command: -promscrape.config=/etc/vmagent/config.yml -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    networks: [opengeobot-net]
    depends_on:
      victoriametrics:
        condition: service_healthy

  loki:
    image: grafana/loki:3.2.1
    profiles: [observability, full]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ../observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector:
    image: timberio/vector:0.41.1-debian
    profiles: [observability, full]
    volumes:
      - ../observability/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --config /etc/vector/vector.yaml
    networks: [opengeobot-net]
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    profiles: [observability, full]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ../observability/grafana-alert-rules.yaml:/etc/grafana/provisioning/alerting/rules.yaml:ro
    networks: [opengeobot-net]
    depends_on:
      victoriametrics:
        condition: service_healthy
      loki:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Cloud profile (cloud + full)
  # ---------------------------------------------------------------------------
  cloud-control:
    build:
      context: ../..
      dockerfile: apps/cloud-control/Dockerfile
    profiles: [cloud, rosclaw-sim, full]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: opengeobot
      DB_USER: opengeobot
      DB_PASSWORD: opengeobot_dev
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
    networks: [opengeobot-net]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-console:
    build:
      context: ../..
      dockerfile: apps/web-console/Dockerfile
    profiles: [cloud, rosclaw-sim, full]
    ports:
      - "5173:80"
    networks: [opengeobot-net]
    depends_on:
      cloud-control:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Simulation profile (sim + full)
  # ---------------------------------------------------------------------------
  # M2 ROS2 simulation stack. Executes registered skills in a simulated
  # environment (no ROS2 installation required). The edge gateway forwards
  # skill requests to the safety gateway, which intercepts and validates them
  # before forwarding to the local skill executor. The executor dispatches to
  # the sim-adapter over NATS via opengeobot.dev.edge.skill.execute.{robot_id}.
  sim-adapter:
    build:
      context: ../../services/sim-adapter
    profiles: [sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ROBOT_ID=rbt_01J00000000000000000000001
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import opengeobot_sim.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ROSClaw NATS Bridge (rosclaw-sim + full)
  # ---------------------------------------------------------------------------
  # Replaces sim-adapter for real hardware control via ROSClaw Edge Runtime.
  # Subscribes to the same NATS subject as sim-adapter; the two are mutually
  # exclusive - do not run both simultaneously.
  # Mounts the ROSClaw source from the host for pip install -e.
  rosclaw-bridge:
    build:
      context: ../../services/rosclaw-bridge
    profiles: [rosclaw-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ROBOT_ID=rbt_01J00000000000000000000001
      - GATEWAY_ID=edge_01
      - ROBOT_ROS_ENDPOINT=ws://ros2-rosbridge:9090
      - ROSCLAW_PROFILE=offline
      - ROSCLAW_SANDBOX=true
      - LOG_LEVEL=INFO
    volumes:
      - /storage/xy/source/rosclaw:/opt/rosclaw-source:ro
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import opengeobot_rosclaw_bridge.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  edge-gateway:
    build:
      context: ../../edge
      dockerfile: gateway/Dockerfile
    profiles: [sim, rosclaw-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ROBOT_ID=rbt_01J00000000000000000000001
      - GATEWAY_ID=edge_01
      - CLOUD_API_BASE_URL=http://cloud-control:8080
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import opengeobot_edge.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  safety-gateway:
    build:
      context: ../../edge/safety-gateway
    profiles: [sim, rosclaw-sim, full]
    ports:
      - "8081:8081"
    environment:
      - NATS_URL=nats://nats:4222
      - GATEWAY_ID=edge_01
      - SAFETY_HEALTH_CHECK_PORT=8081
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8081/health\", timeout=2)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  local-skill-executor:
    build:
      context: ../../edge/local-skill-executor
    profiles: [sim, rosclaw-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - GATEWAY_ID=edge_01
      - DEFAULT_ADAPTER_TYPE=simulation
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
      safety-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import opengeobot_skill_executor.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # QwenPaw LLM service (sim + full)
  # ---------------------------------------------------------------------------
  # Real QwenPaw Docker image for the agent-runtime to call via HTTP.
  # The agent-runtime generates UNTRUSTED mission plan proposals via the
  # QwenPaw chat-completions API (EXT-QWENPAW contract, PINNED).
  # NOTE: `latest` tag is for local E2E verification only. Project rules
  # prohibit `latest` in production - pin to a specific version before deployment.
  qwenpaw:
    image: agentscope-registry.ap-southeast-1.cr.aliyuncs.com/agentscope/qwenpaw:latest
    profiles: [sim, rosclaw-sim, full]
    ports:
      - "8000:8088"
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8088/api/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # ---------------------------------------------------------------------------
  # Agent runtime / QwenPaw adapter (sim + full)
  # ---------------------------------------------------------------------------
  # QwenPaw AgentRuntimeProvider adapter. Subscribes to mission planning
  # requests via NATS and generates UNTRUSTED plan proposals via the QwenPaw
  # API. All proposals must be validated upstream before execution.
  agent-runtime:
    build:
      context: ../../services/agent-runtime
    profiles: [sim, rosclaw-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - QWENPAW_ENDPOINT=http://qwenpaw:8088/v1/chat/completions
      - QWENPAW_ADMIN_BASE_URL=http://qwenpaw:8088
      - QWENPAW_MODEL=opengeobot-controller
      - QWENPAW_MODEL_PROVIDER=opencode
      - QWENPAW_MODEL_NAME=mimo-v2.5-free
      - QWENPAW_TIMEOUT=45
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
      qwenpaw:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ROS1 adapter profile (ros1 + full)
  # ---------------------------------------------------------------------------
  # F-ADAPTER-002: ROS1 protocol translation adapter. Translates platform skill
  # commands into ROS1/Unitree/custom robot protocol messages over NATS. The
  # adapter never drives motors directly — translations are proposals validated
  # by the edge Safety Gateway.
  ros1-adapter:
    build:
      context: ../../services/ros1-adapter
    profiles: [ros1, ros1-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ADAPTER_ID=adp_01J00000000000000000000001
      - ROBOT_ID=rbt_01J00000000000000000000001
      - PROTOCOL_TYPE=ROS1
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      - nats
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ROS2 real environment profile (ros2 + full)
  # ---------------------------------------------------------------------------
  # F-ADAPTER-001: Real ROS2 Jazzy environment with turtlesim as the simulated
  # robot node. The ros2-adapter uses rclpy to publish to standard ROS2 topics
  # (/turtle1/cmd_vel) via registered Skills only. Agent/LLM never publishes
  # /cmd_vel directly. DDS domain is isolated via ROS_DOMAIN_ID.
  ros2-turtlesim:
    image: ros:jazzy-ros-core
    profiles: [ros2, rosclaw-sim, full]
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY:-}
    command: ros2 run turtlesim turtlesim_node
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # ROS2 rosbridge server (rosclaw-sim + full)
  # ---------------------------------------------------------------------------
  # WebSocket bridge (rosbridge_server) that exposes the ROS2 DDS domain to
  # the rosclaw-bridge service. The rosclaw-bridge connects via
  # ws://ros2-rosbridge:9090 to publish skill commands. Shares the same
  # ROS_DOMAIN_ID=42 as ros2-turtlesim so DDS messages are visible.
  ros2-rosbridge:
    image: ros:jazzy-ros-base
    profiles: [rosclaw-sim, full]
    environment:
      - ROS_DOMAIN_ID=42
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y --no-install-recommends ros-jazzy-rosbridge-server &&
        ros2 launch rosbridge_server rosbridge_websocket.launch.xml
      "
    ports:
      - "9090:9090"
    networks: [opengeobot-net]
    depends_on:
      ros2-turtlesim:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:9090\", timeout=2)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  ros2-adapter:
    build:
      context: ../../services/ros2-adapter
    profiles: [ros2, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ROBOT_ID=rbt_01J00000000000000000000001
      - ROS_DOMAIN_ID=42
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
      ros2-turtlesim:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import opengeobot_ros2.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # ROS1 real environment profile (ros1-sim + full)
  # ---------------------------------------------------------------------------
  # F-ADAPTER-002: Real ROS1 Noetic environment with roscore and turtlesim.
  # The ros1-adapter connects to the real ROS Master via ROS_MASTER_URI and
  # publishes to ROS1 topics through rospy. ROS1 is isolated from ROS2.
  ros1-roscore:
    image: ros:noetic-ros-core
    profiles: [ros1-sim, full]
    command: roscore
    networks: [opengeobot-net]
    healthcheck:
      test: ["CMD-SHELL", "rostopic list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  ros1-turtlesim:
    image: ros:noetic-ros-core
    profiles: [ros1-sim, full]
    environment:
      - ROS_MASTER_URI=http://ros1-roscore:11311
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY:-}
    command: rosrun turtlesim turtlesim_node
    networks: [opengeobot-net]
    depends_on:
      ros1-roscore:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  ros1-adapter-native:
    build:
      context: ../../services/ros1-adapter
    profiles: [ros1-sim, full]
    environment:
      - NATS_URL=nats://nats:4222
      - ADAPTER_ID=adp_01J00000000000000000000001
      - ROBOT_ID=rbt_01J00000000000000000000001
      - PROTOCOL_TYPE=ROS1_NATIVE
      - ROS_MASTER_URI=http://ros1-roscore:11311
      - ROS1_NODE_NAME=opengeobot_ros1_native
      - LOG_LEVEL=INFO
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
      ros1-roscore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import opengeobot_ros1.main' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Zenoh weak-network bridge profile (zenoh + full)
  # ---------------------------------------------------------------------------
  # C15: Zenoh ROS2DDS bridge for weak network testing. Bridges ROS2 DDS domain
  # traffic across networks. Optional component - does not affect main path.
  # Weak network impairment can be injected via `tc netem` on the bridge container.
  # See deploy/compose/zenoh/README.md for configuration details.
  zenoh-bridge-ros2dds:
    image: eclipse/zenoh-bridge-ros2dds:1.1.1
    profiles: [zenoh, full]
    volumes:
      - ./zenoh/zenoh-bridge-ros2dds.json5:/zenoh-bridge-ros2dds.json5:ro
    command: -c /zenoh-bridge-ros2dds.json5
    environment:
      - ROS_DOMAIN_ID=42
    ports:
      - "7447:7447"
    networks: [opengeobot-net]
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
